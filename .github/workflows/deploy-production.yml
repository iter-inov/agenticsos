name: Deploy Production

on:
  push:
    tags:
      - "v*"

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID_PROD: ${{ secrets.SUPABASE_PROJECT_ID_PROD }}

jobs:
  ci-check:
    name: CI Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-edge-functions:
    name: Deploy Edge Functions (Production)
    needs: ci-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID_PROD

      - name: Deploy all edge functions
        run: |
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            echo "Deploying $fn_name..."
            supabase functions deploy "$fn_name" --no-verify-jwt
          done

  deploy-migrations:
    name: Run Migrations (Production)
    needs: ci-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID_PROD

      - name: Push migrations
        run: supabase db push
